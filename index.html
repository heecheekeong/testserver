<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Redirect immediately -->
    <meta http-equiv="refresh" content="0; url=https://example.com/callback">

    <title>Redirecting...</title>

    <script>
        // JavaScript redirect (more reliable than meta refresh alone)
        window.location.replace("trainingapp://oauth/callback?code=12345");
    </script>
</head>
<body>
    <p>Redirecting...</p>
    <p>If you are not redirected automatically,
        <a href="https://example.com/callback">click here</a>.
    </p>
</body>
</html>
